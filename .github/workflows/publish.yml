name: Publish to npm

# Publishes the package when a GitHub Release is published.
# Cut a release whose tag is `v<version>` matching package.json (e.g. v0.1.0).
on:
  release:
    types: [published]
  workflow_dispatch: # allow a manual run from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm Trusted Publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 20 ships npm 10.x.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # Ensure the tag being released matches the version we're about to publish.
      # Skipped on manual (workflow_dispatch) runs, which have no release tag.
      - name: Verify tag matches package.json version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Release tag ($TAG) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi

      - name: Build
        run: npm run build

      # --provenance requires id-token: write (above). Trusted Publishing means
      # no NPM_TOKEN is needed — auth comes from the OIDC token.
      - name: Publish
        run: npm publish --provenance --access public
