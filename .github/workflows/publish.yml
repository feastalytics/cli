name: Publish to npm

# One-click release. Actions tab -> "Publish to npm" -> Run workflow -> pick a
# bump. It bumps the version, commits + tags on main, publishes to npm with
# provenance (via Trusted Publishing / OIDC — no NPM_TOKEN), and cuts a Release.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version-bump commit + tag, create the Release
      id-token: write # npm Trusted Publishing (OIDC) + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 20 ships npm 10.x.
      # Pin to npm@11 (not @latest): npm@12 requires Node >= 22.
      - name: Update npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Creates the bump commit + tag locally only. If a later step fails,
      # nothing has been pushed, so main stays clean.
      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ inputs.bump }} -m "release: v%s")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public

      # Only reached if the publish succeeded — now make it official.
      - name: Push bump commit + tag
        run: git push --follow-tags

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.bump.outputs.version }}" --title "${{ steps.bump.outputs.version }}" --generate-notes
